<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TaskCalendar – Team View</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#020617;color:#e2e8f0;font-family:'Segoe UI',sans-serif}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect} = React;

// ── SUPABASE CONFIG ──
const SUPABASE_URL = "https://zcdvxrhldqcnizpspvdx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjZHZ4cmhsZHFjbml6cHNwdmR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDIzODMsImV4cCI6MjA4ODcxODM4M30.CD-ObU2hF3Ay76Jhtvnh8zHbEUX0ZV70LelGaoQc1Tg";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PC={Low:"#10b981",Medium:"#f59e0b",High:"#ef4444"};
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const SM={
  pending:  {label:"Pending",  color:"#f59e0b",bg:"#f59e0b22",icon:"⏳"},
  completed:{label:"Completed",color:"#10b981",bg:"#10b98122",icon:"✅"},
  missed:   {label:"Missed",   color:"#ef4444",bg:"#ef444422",icon:"❌"},
  deferred: {label:"Deferred", color:"#8b5cf6",bg:"#8b5cf622",icon:"🔄"},
};

const tod=new Date(); tod.setHours(0,0,0,0);
const fmt=d=>d.toISOString().split("T")[0];
const sow=d=>{const c=new Date(d);c.setDate(c.getDate()-c.getDay());return c;};
const addD=(d,n)=>{const c=new Date(d);c.setDate(c.getDate()+n);return c;};

function App(){
  const [view,setView]=useState("monthly");
  const [cur,setCur]=useState(new Date(tod));
  const [tasks,setTasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lastUpdated,setLastUpdated]=useState(null);
  const [showDetail,setShowDetail]=useState(null);
  const [sfilt,setSfilt]=useState("all");
  const [pfilt,setPfilt]=useState("all");
  const [liveMsg,setLiveMsg]=useState("");

  const lastUpdatedRef = React.useRef(null);

  async function loadTasks(isPolling=false){
    try{
      const {data,error}=await supabase.from("tasks").select("*").eq("id",1).single();
      if(!error&&data){
        const newUpdated = data.updated_at;
        // Only update UI if data actually changed
        if(!isPolling || newUpdated !== lastUpdatedRef.current){
          if(isPolling && lastUpdatedRef.current && newUpdated !== lastUpdatedRef.current){
            setLiveMsg("🔄 Just updated!");
            setTimeout(()=>setLiveMsg(""),3000);
          }
          lastUpdatedRef.current = newUpdated;
          setTasks(data.data||[]);
          setLastUpdated(data.updated_at?new Date(data.updated_at).toLocaleString():null);
        }
      }
    }catch(e){console.error(e);}
    finally{if(!isPolling)setLoading(false);}
  }

  useEffect(()=>{
    // Initial load
    loadTasks(false);
    // Poll every 10 seconds for updates
    const interval = setInterval(()=>loadTasks(true), 10000);
    // Also try realtime as bonus
    const channel=supabase.channel("tasks-teamview")
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},payload=>{
        if(payload.new&&payload.new.data){
          setTasks(payload.new.data);
          setLastUpdated(new Date().toLocaleString());
          setLiveMsg("🔄 Just updated!");
          setTimeout(()=>setLiveMsg(""),3000);
        }
      }).subscribe();
    return()=>{clearInterval(interval);supabase.removeChannel(channel);};
  },[]);

  const expanded=useMemo(()=>{
    const res=[];
    const rs=new Date(cur),re=new Date(cur);
    if(view==="daily"){re.setDate(re.getDate()+1);}
    else if(view==="weekly"){const ws=sow(cur);rs.setTime(ws.getTime());re.setTime(addD(ws,7).getTime());}
    else{rs.setDate(1);re.setMonth(re.getMonth()+1);re.setDate(0);re.setDate(re.getDate()+1);}
    tasks.forEach(t=>{
      const base=new Date(t.date+"T00:00:00");
      if(t.repeat==="none"){res.push({...t});return;}
      let c=new Date(base);
      const lim=new Date(re);lim.setDate(lim.getDate()+1);
      while(c<=lim){
        if(c>=rs)res.push({...t,date:fmt(c),_oid:t.id});
        if(t.repeat==="daily")c=addD(c,1);
        else if(t.repeat==="weekly")c=addD(c,7);
        else if(t.repeat==="monthly"){c=new Date(c);c.setMonth(c.getMonth()+1);}
        else break;
        if(c>lim)break;
      }
    });
    return res;
  },[tasks,cur,view]);

  const tfd=ds=>expanded.filter(t=>t.date===ds&&(pfilt==="all"||t.priority===pfilt)&&(sfilt==="all"||t.status===sfilt));

  function nav(dir){const d=new Date(cur);if(view==="daily")d.setDate(d.getDate()+dir);else if(view==="weekly")d.setDate(d.getDate()+dir*7);else d.setMonth(d.getMonth()+dir);setCur(d);}
  const navLabel=()=>{
    if(view==="daily")return cur.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
    if(view==="weekly"){const ws=sow(cur),we=addD(ws,6);return`${ws.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${we.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;}
    return`${MONTHS[cur.getMonth()]} ${cur.getFullYear()}`;
  };

  const doneC=tasks.filter(t=>t.status==="completed").length;
  const missC=tasks.filter(t=>t.status==="missed").length;
  const pendC=tasks.filter(t=>t.status==="pending").length;
  const defC=tasks.filter(t=>t.status==="deferred").length;
  const rate=tasks.length?Math.round((doneC/tasks.length)*100):0;

  function TaskDetail({t,onClose}){
    const s=SM[t.status]||SM.pending;
    return(<div style={{position:"fixed",inset:0,background:"#00000090",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}} onClick={onClose}>
      <div style={{background:"#0f172a",border:`1px solid ${s.color}44`,borderLeft:`4px solid ${s.color}`,borderRadius:16,padding:24,width:"100%",maxWidth:400,boxShadow:"0 25px 60px #0008"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <h2 style={{fontWeight:800,fontSize:17,color:"#e2e8f0",flex:1,paddingRight:12}}>{t.title}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          <span style={{background:s.bg,color:s.color,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700}}>{s.icon} {s.label}</span>
          <span style={{background:PC[t.priority]+"22",color:PC[t.priority],borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700}}>{t.priority} Priority</span>
          {t.repeat!=="none"&&<span style={{background:"#6366f122",color:"#6366f1",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700}}>🔁 {t.repeat}</span>}
        </div>
        <div style={{background:"#1e293b",borderRadius:10,padding:12,marginBottom:12,display:"flex",flexDirection:"column",gap:7}}>
          <div style={{display:"flex",gap:8,fontSize:13}}><span style={{color:"#64748b",minWidth:90}}>📅 Deadline</span><span style={{color:"#e2e8f0",fontWeight:600}}>{t.date}</span></div>
          {t.completedAt&&<div style={{display:"flex",gap:8,fontSize:13}}><span style={{color:"#64748b",minWidth:90}}>✅ Completed</span><span style={{color:"#10b981",fontWeight:600}}>{new Date(t.completedAt).toLocaleString()}</span></div>}
          {t.notes&&<div style={{display:"flex",gap:8,fontSize:13}}><span style={{color:"#64748b",minWidth:90}}>📝 Notes</span><span style={{color:"#e2e8f0"}}>{t.notes}</span></div>}
        </div>
        {(t.status==="missed"||t.status==="deferred")&&t.reason&&(
          <div style={{background:s.bg,border:`1px solid ${s.color}44`,borderRadius:10,padding:12,fontSize:13}}>
            <div style={{fontWeight:700,color:s.color,marginBottom:4}}>{t.status==="missed"?"❌ Missed Reason":"🔄 Deferred Reason"}</div>
            <div style={{color:"#e2e8f0"}}>{t.reason}</div>
            {t.reasonDetail&&<div style={{color:"#94a3b8",marginTop:4,fontSize:12}}>{t.reasonDetail}</div>}
          </div>
        )}
        <div style={{marginTop:14,padding:"8px 12px",background:"#1e293b",borderRadius:8,fontSize:11,color:"#475569",textAlign:"center"}}>👁 View Only — Contact the owner to make changes</div>
      </div>
    </div>);
  }

  function renderMonthly(){
    const yr=cur.getFullYear(),mo=cur.getMonth();
    const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
    const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(new Date(yr,mo,d));
    return(<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{DAYS.map(d=><div key={d} style={{textAlign:"center",fontWeight:700,fontSize:11,color:"#94a3b8",padding:"5px 0"}}>{d}</div>)}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((date,i)=>{
          if(!date)return<div key={i}/>;
          const ds=fmt(date),ts=tfd(ds),isT=ds===fmt(tod);
          const hasMiss=ts.some(t=>t.status==="missed"),hasDone=ts.some(t=>t.status==="completed");
          return(<div key={ds} onClick={()=>{setCur(new Date(ds+"T00:00:00"));setView("daily");}} style={{minHeight:78,background:"#0f172a",border:isT?"2px solid #6366f1":"1px solid #1e293b",borderRadius:9,padding:5,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
              <div style={{display:"flex",alignItems:"center",gap:3}}>
                <span style={{fontWeight:isT?700:400,color:isT?"#6366f1":"#cbd5e1",fontSize:12}}>{date.getDate()}</span>
                {hasMiss&&<span style={{width:5,height:5,borderRadius:"50%",background:"#ef4444",display:"inline-block"}}/>}
                {hasDone&&<span style={{width:5,height:5,borderRadius:"50%",background:"#10b981",display:"inline-block"}}/>}
              </div>
            </div>
            {ts.slice(0,3).map(t=><div key={t.id+t.date} onClick={e=>{e.stopPropagation();setShowDetail(t);}} style={{background:t.color+"22",borderLeft:`3px solid ${SM[t.status]?.color||t.color}`,borderRadius:3,padding:"2px 4px",marginBottom:2,fontSize:10,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textDecoration:t.status==="completed"?"line-through":"none",opacity:t.status==="completed"?0.55:1}}>{SM[t.status]?.icon} {t.title}</div>)}
            {ts.length>3&&<div style={{fontSize:9,color:"#64748b"}}>+{ts.length-3} more</div>}
          </div>);
        })}
      </div>
    </div>);
  }

  function renderWeekly(){
    const ws=sow(cur),days=Array.from({length:7},(_,i)=>addD(ws,i));
    return(<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
      {days.map(date=>{
        const ds=fmt(date),ts=tfd(ds),isT=ds===fmt(tod);
        return(<div key={ds} style={{background:"#0f172a",border:isT?"2px solid #6366f1":"1px solid #1e293b",borderRadius:10,padding:8,minHeight:180}}>
          <div style={{textAlign:"center",marginBottom:6}}><div style={{fontSize:10,color:"#64748b",fontWeight:700}}>{DAYS[date.getDay()]}</div><div style={{fontSize:20,fontWeight:700,color:isT?"#6366f1":"#e2e8f0"}}>{date.getDate()}</div></div>
          {ts.map(t=><div key={t.id+t.date} onClick={()=>setShowDetail(t)} style={{background:t.color+"22",borderLeft:`3px solid ${SM[t.status]?.color||t.color}`,borderRadius:5,padding:"5px 6px",marginBottom:5,cursor:"pointer"}}>
            <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0",textDecoration:t.status==="completed"?"line-through":"none",opacity:t.status==="completed"?0.6:1,marginBottom:2}}>{SM[t.status]?.icon} {t.title}</div>
            <div style={{display:"flex",gap:4}}><span style={{fontSize:9,background:SM[t.status]?.bg,color:SM[t.status]?.color,borderRadius:10,padding:"1px 6px",fontWeight:700}}>{SM[t.status]?.label}</span><span style={{fontSize:9,background:PC[t.priority]+"22",color:PC[t.priority],borderRadius:10,padding:"1px 6px",fontWeight:700}}>{t.priority}</span></div>
          </div>)}
        </div>);
      })}
    </div>);
  }

  function renderDaily(){
    const ds=fmt(cur),ts=tfd(ds),comp=ts.filter(t=>t.status==="completed").length;
    return(<div style={{maxWidth:560,margin:"0 auto"}}>
      {ts.length>0&&<div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:13,color:"#94a3b8",flexShrink:0}}>Progress</span>
        <div style={{flex:1,height:8,background:"#1e293b",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${ts.length?Math.round((comp/ts.length)*100):0}%`,background:"linear-gradient(90deg,#6366f1,#10b981)",borderRadius:4,transition:"width .4s"}}/></div>
        <span style={{fontSize:13,fontWeight:700,color:"#10b981",flexShrink:0}}>{comp}/{ts.length} done</span>
      </div>}
      {ts.length===0&&<div style={{textAlign:"center",color:"#475569",padding:36,fontSize:14}}>No tasks for this day.</div>}
      {ts.map(t=>{const s=SM[t.status]||SM.pending;return(<div key={t.id+t.date} onClick={()=>setShowDetail(t)} style={{background:"#0f172a",border:`1px solid ${s.color}44`,borderLeft:`4px solid ${s.color}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:t.status==="completed"?"#475569":"#e2e8f0",textDecoration:t.status==="completed"?"line-through":"none"}}>{t.title}</div>
            {t.notes&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>{t.notes}</div>}
            {(t.status==="missed"||t.status==="deferred")&&t.reason&&<div style={{fontSize:11,color:s.color,background:s.bg,borderRadius:6,padding:"4px 8px",marginTop:5}}><strong>{t.status==="missed"?"Missed":"Deferred"}:</strong> {t.reason}{t.reasonDetail?` — ${t.reasonDetail}`:""}</div>}
            {t.completedAt&&<div style={{fontSize:11,color:"#10b981",marginTop:4}}>✅ {new Date(t.completedAt).toLocaleString()}</div>}
            <div style={{display:"flex",gap:4,marginTop:6}}><span style={{fontSize:10,background:s.bg,color:s.color,borderRadius:20,padding:"2px 8px",fontWeight:700}}>{s.icon} {s.label}</span>{t.repeat!=="none"&&<span style={{fontSize:10,color:"#6366f1",background:"#6366f122",borderRadius:10,padding:"2px 7px"}}>🔁 {t.repeat}</span>}</div>
          </div>
          <span style={{background:PC[t.priority]+"22",color:PC[t.priority],borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,flexShrink:0}}>{t.priority}</span>
        </div>
      </div>);})}
    </div>);
  }

  if(loading)return(
    <div style={{minHeight:"100vh",background:"#020617",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>☁️</div>
        <div style={{color:"#6366f1",fontWeight:700,fontSize:16}}>Connecting to live calendar...</div>
        <div style={{color:"#475569",fontSize:12,marginTop:6}}>Powered by Supabase</div>
      </div>
    </div>
  );

  return(<div style={{minHeight:"100vh",background:"#020617",color:"#e2e8f0",fontFamily:"'Segoe UI',sans-serif",padding:"16px"}}>
  <div style={{maxWidth:1050,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
          <h1 style={{margin:0,fontSize:20,fontWeight:800,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>📋 TaskCalendar</h1>
          <span style={{background:"#10b98122",color:"#10b981",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,border:"1px solid #10b98144"}}>👁 Live Team View</span>
          {liveMsg&&<span style={{background:"#6366f122",color:"#6366f1",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>{liveMsg}</span>}
        </div>
        <div style={{fontSize:11,color:"#475569"}}>
          {lastUpdated&&<span>Owner last updated: <strong style={{color:"#94a3b8"}}>{lastUpdated}</strong> &nbsp;·&nbsp;</span>}
          <span style={{color:"#10b981"}}>✅ {doneC}</span>&nbsp;·&nbsp;<span style={{color:"#f59e0b"}}>⏳ {pendC}</span>&nbsp;·&nbsp;<span style={{color:"#ef4444"}}>❌ {missC}</span>&nbsp;·&nbsp;<span style={{color:"#8b5cf6"}}>🔄 {defC}</span>&nbsp;·&nbsp;<span style={{color:"#6366f1",fontWeight:700}}>{rate}% done</span>
        </div>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {["daily","weekly","monthly"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:20,border:"none",background:view===v?"#6366f1":"#1e293b",color:view===v?"#fff":"#94a3b8",fontWeight:700,fontSize:12,cursor:"pointer",textTransform:"capitalize"}}>{v}</button>)}
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
      {[["✅","Completed",doneC,"#10b981"],["⏳","Pending",pendC,"#f59e0b"],["❌","Missed",missC,"#ef4444"],["🔄","Deferred",defC,"#8b5cf6"]].map(([icon,label,val,color])=>(
        <div key={label} style={{background:"#0f172a",border:`1px solid ${color}33`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:20}}>{icon}</div>
          <div><div style={{fontSize:18,fontWeight:800,color}}>{val}</div><div style={{fontSize:10,color:"#64748b",fontWeight:600}}>{label}</div></div>
        </div>
      ))}
    </div>

    <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:12,color:"#94a3b8",flexShrink:0}}>Overall Progress</span>
      <div style={{flex:1,height:8,background:"#1e293b",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${rate}%`,background:"linear-gradient(90deg,#6366f1,#10b981)",borderRadius:4,transition:"width .6s"}}/></div>
      <span style={{fontSize:13,fontWeight:700,color:"#6366f1",flexShrink:0}}>{rate}%</span>
    </div>

    <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      {["all","High","Medium","Low"].map(p=><button key={p} onClick={()=>setPfilt(p)} style={{padding:"3px 10px",borderRadius:20,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:pfilt===p?(p==="all"?"#334155":PC[p]+"33"):"#0f172a",color:pfilt===p?(p==="all"?"#e2e8f0":PC[p]):"#475569",outline:pfilt===p?`1px solid ${p==="all"?"#334155":PC[p]}`:"none"}}>{p==="all"?"All Priority":p}</button>)}
      <div style={{width:1,height:16,background:"#1e293b",margin:"0 2px"}}/>
      {["all","pending","completed","missed","deferred"].map(s=>{const m=SM[s]||{};return(<button key={s} onClick={()=>setSfilt(s)} style={{padding:"3px 10px",borderRadius:20,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:sfilt===s?(s==="all"?"#334155":m.bg):"#0f172a",color:sfilt===s?(s==="all"?"#e2e8f0":m.color):"#475569",outline:sfilt===s?`1px solid ${s==="all"?"#334155":m.color}`:"none"}}>{s==="all"?"All Status":`${m.icon} ${m.label}`}</button>);})}
    </div>

    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:16}}>
      <button onClick={()=>nav(-1)} style={{background:"#1e293b",border:"none",color:"#e2e8f0",borderRadius:8,padding:"5px 13px",fontSize:16,cursor:"pointer"}}>‹</button>
      <button onClick={()=>setCur(new Date(tod))} style={{background:"none",border:"none",color:"#6366f1",fontWeight:700,fontSize:12,cursor:"pointer"}}>Today</button>
      <span style={{fontWeight:700,fontSize:14,color:"#e2e8f0",minWidth:220,textAlign:"center"}}>{navLabel()}</span>
      <button onClick={()=>nav(1)} style={{background:"#1e293b",border:"none",color:"#e2e8f0",borderRadius:8,padding:"5px 13px",fontSize:16,cursor:"pointer"}}>›</button>
    </div>

    {view==="monthly"&&renderMonthly()}
    {view==="weekly"&&renderWeekly()}
    {view==="daily"&&renderDaily()}

    <div style={{textAlign:"center",marginTop:20,padding:"10px",background:"#0f172a",borderRadius:10,fontSize:11,color:"#334155"}}>
      👁 Read-only · Live sync via Supabase · Click any task for details
    </div>
  </div>
  {showDetail&&<TaskDetail t={showDetail} onClose={()=>setShowDetail(null)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
